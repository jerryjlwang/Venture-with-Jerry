<svg xmlns="http://www.w3.org/2000/svg" width="1064" height="823" viewBox="0 0 1064 823">
  <defs>
    <radialGradient id="backgroundGlow" cx="28%" cy="24%" r="70%">
      <stop offset="0%" stop-color="#10213f"/>
      <stop offset="48%" stop-color="#0b1428"/>
      <stop offset="100%" stop-color="#07101f"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="18%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#0f4d99" stop-opacity="0.35"/>
      <stop offset="52%" stop-color="#0a2a55" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#081124" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feFlood flood-color="#7fe8ff" flood-opacity="0.32"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .word {
        font-family: Rockwell, "Rockwell Extra Bold", "American Typewriter", Georgia, serif;
        font-size: 172px;
        font-weight: 900;
        letter-spacing: -6px;
        paint-order: stroke fill;
        stroke-linejoin: round;
        text-anchor: middle;
      }
    </style>
  </defs>

  <rect width="1064" height="823" fill="url(#backgroundGlow)"/>
  <rect width="1064" height="823" fill="url(#leftGlow)"/>

